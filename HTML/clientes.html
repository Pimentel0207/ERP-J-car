<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Clientes - J-Car</title>

  <link rel="stylesheet" href="../CSS/clientes.css">
  <link rel="stylesheet" href="../CSS/global.css">
</head>

<body>


  <div class="logo-wrapper">
    <img src="../fotos/logo.png" alt="Logo J-Car" class="logo">
  </div>

  <div class="layout">

    <div class="col-filtro">
      <table class="table-filtro">

        <tr class="filtroT">
          <th colspan="2" height="78px">Filtros</th>
        </tr>

        <tr>
          <td height="60px" class="pop">Nome</td>
          <td><input type="text" id="filtroNome" placeholder="Ex: João"></td>
        </tr>

        <tr>
          <td height="60px" class="pop">CPF / CNPJ</td>
          <td><input type="text" id="filtroDoc" placeholder="Ex: 123.456.789-00"></td>
        </tr>

        <tr>
          <td colspan="2" align="center" height="80px">
            <button id="btnAbrirModal"
              style="background: #2563eb; color: white; width: 85%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
              + Cadastrar Novo Cliente
            </button>
          </td>
        </tr>

        <tr>
          <td colspan="2" align="center" height="60px">
            <a href="menu.html" class="botao-voltar">← Voltar ao menu</a>
          </td>
        </tr>

      </table>
    </div>


    <div class="col-tabela">
      <table class="table">
        <thead>
          <tr class="itens">
            <th height="78px">Nome completo</th>
            <th>CPF / CNPJ</th>
            <th>Data Nasc.</th>
            <th>Telefone</th>
            <th>Email</th>
            <th>Endereço</th>
            <th>Última compra</th>
            <th>Veículo</th>
            <th colspan="2">Ações</th>
          </tr>
        </thead>
        <tbody id="corpoTabelaClientes">
        </tbody>
      </table>
    </div>
  </div>

  <div id="modalCadastro" class="modal-fundo">
    <div class="modal-conteudo">

      <div class="modal-header">
        <h2>Cadastrar Novo Cliente</h2>
        <button id="btnFecharModal" class="btn-fechar-modal">&times;</button>
      </div>

      <form id="formCadastrarCliente">
        <div class="modal-grid">

          <div class="linha-completa">
            <label>Nome Completo / Empresa:</label>
            <input type="text" id="cadNome" required placeholder="Ex: João Silva ou Silva LTDA">
          </div>

          <div>
            <label>CPF ou CNPJ:</label>
            <input type="text" id="cadDoc" required placeholder="Ex: 123.456.789-00">
          </div>

          <div>
            <label>Telefone:</label>
            <input type="text" id="cadTelefone" placeholder="Ex: (11) 98888-1111">
          </div>

          <div class="linha-completa">
            <label>Email:</label>
            <input type="email" id="cadEmail" placeholder="Ex: contato@email.com">
          </div>

          <div class="linha-completa">
            <label>Endereço:</label>
            <input type="text" id="cadEndereco" placeholder="Ex: São Paulo - SP">
          </div>

          <div>
            <label>Data de Nascimento:</label>
            <input type="date" id="cadNascimento">
            <small style="color: #666; font-size: 11px;">(Vazio se empresa)</small>
          </div>

          <div>
            <label>Última Compra:</label>
            <input type="date" id="cadUltimaCompra">
          </div>

          <div class="linha-completa">
            <label>Veículo Comprado (Histórico):</label>
            <input type="text" id="cadVeiculo" placeholder="Ex: BMW 320i M Sport">
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-cancelar" id="btnCancelarCliente">Cancelar</button>
          <button type="submit" class="btn-salvar">Salvar Cliente</button>
        </div>
      </form>

    </div>
  </div>

  <script src="../js/clientes.js"></script>
</body>

</html>
