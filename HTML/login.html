<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Login - J-Car</title>
  <link rel="stylesheet" href="../CSS/global.css">
</head>

<body class="tela-central bg-imagem">

  <div class="card-vidro auth">

    <img src="../fotos/logo.png" alt="Logo J-Car" class="logo">

    <h2>Acesso ao Sistema</h2>
    <p class="sub">Entre com suas credenciais</p>

    <form>
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="Digite seu e-mail" required>

      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="Digite sua senha" required>

      <button type="submit" class="btn-acao">Entrar</button>

      <p class="erro" style="display:none; color: red;">E-mail ou senha inválidos</p>

      <a href="signup.html" class="auth-link">Não tem uma conta? Criar conta</a>
    </form>


  </div>


  <script src="../js/login.js"></script>

</body>

</html>
