<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Criar Conta - J-Car</title>
  <link rel="stylesheet" href="../CSS/global.css">
</head>

<body class="tela-central bg-imagem">

  <div class="card-vidro auth">

    <img src="../fotos/logo.png" alt="Logo J-Car" class="logo">

    <h2>Criar Conta</h2>
    <p class="sub">Crie sua conta para acessar o sistema</p>

    <form id="formSignup">
      <label for="nome">Nome do Usuário</label>
      <input type="text" id="nome" placeholder="Ex: Carlos Silva" required>

      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="Digite seu e-mail" required>

      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="Digite sua senha" required>

      <label for="confirm-password">Confirmar Senha</label>
      <input type="password" id="confirm-password" placeholder="Confirme sua senha" required>

      <button type="submit" class="btn-acao">Criar Conta</button>

      <p class="erro" style="display:none; color: red; margin-top: 10px;"></p>
      <p class="sucesso" style="display:none; color: green; margin-top: 10px;"></p>

      <a href="login.html" class="auth-link">Já tem uma conta? Faça login</a>
    </form>

  </div>

  <script src="../js/signup.js"></script>
</body>

</html>
