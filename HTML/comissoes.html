<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Comissões e Metas - J-Car</title>
    <link rel="stylesheet" href="../CSS/global.css">
</head>

<body>

    <div class="logo-wrapper">
        <img src="../fotos/logo.png" alt="Logo J-Car" class="logo">
    </div>

    <div class="layout">

        <div class="col-filtro">
            <table class="table-filtro">
                <tr class="filtroT">
                    <th height="78px">Performance</th>
                </tr>
                <tr>
                    <td style="padding-top: 20px; color: #4b5563; font-size: 14px;">
                        Aqui você acompanha o faturamento total e o valor das comissões acumuladas.
                    </td>
                </tr>
                <tr>
                    <td align="center" height="80px" style="padding-top: 30px;">
                        <a href="menu.html" class="botao-voltar" style="margin-top: 0;">← Voltar ao menu</a>
                    </td>
                </tr>
            </table>
        </div>

        <div class="col-tabela">
            <h2 id="tituloPagina" style="margin-top: 0; color: #111827; margin-bottom: 20px;">Relatório de Comissões
            </h2>

            <div style="display: flex; gap: 20px; margin-bottom: 30px;">
                <div class="card-vidro" style="flex: 1; padding: 20px; text-align: center; border: 1px solid #e5e7eb;">
                    <span style="color: #6b7280; font-size: 12px; font-weight: bold; text-transform: uppercase;">Total
                        Vendido</span>
                    <h3 id="resumoTotalVendido" style="color: #2563eb; margin: 10px 0;">R$ 0,00</h3>
                </div>
                <div class="card-vidro" style="flex: 1; padding: 20px; text-align: center; border: 1px solid #e5e7eb;">
                    <span
                        style="color: #6b7280; font-size: 12px; font-weight: bold; text-transform: uppercase;">Comissão
                        Acumulada (1%)</span>
                    <h3 id="resumoComissao" style="color: #10b981; margin: 10px 0;">R$ 0,00</h3>
                </div>
            </div>

            <table class="table">
                <thead>
                    <tr>
                        <th style="border-top-left-radius: 8px;">Vendedor</th>
                        <th>Qtd. Vendas</th>
                        <th>Volume Total (R$)</th>
                        <th style="border-top-right-radius: 8px;">Comissão a Receber</th>
                    </tr>
                </thead>
                <tbody id="corpoTabelaComissoes">
                </tbody>
            </table>
        </div>

    </div>

    <script src="../js/comissoes.js"></script>
</body>

</html>
