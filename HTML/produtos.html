<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>
    <link rel="stylesheet" href="../CSS/produtos.css">
    <link rel="stylesheet" href="../CSS/global.css">

</head>

<body>
    <div class="logo-wrapper">
        <img src="../fotos/logo.png" alt="Logo J-Car" class="logo">
    </div>

    <div class="layout">
        <div class="filtro2">
            <table class="filtro">
                <tr class="tfiltro">
                    <th colspan="2" height="78px">Filtros</th>
                </tr>

                <tr>
                    <td height="60px" class="pop">Carro</td>
                    <td>
                        <input type="text" id="inputBusca" placeholder="Pesquisar marca ou modelo...">
                    </td>
                </tr>

                <tr>
                    <td height="55px" class="pop">Preço</td>
                    <td>
                        <select id="filtroPreco">
                            <option value="todos">Todos</option>
                            <option value="300000">Até 300.000</option>
                            <option value="600000">300.000 - 600.000</option>
                            <option value="acima">Acima de 600.000</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td height="55px" class="pop">Carroceria</td>
                    <td>
                        <select id="filtroCarroceria">
                            <option value="todos">Todos</option>
                            <option value="SUV">SUV</option>
                            <option value="Sedan">Sedan</option>
                            <option value="Hatch">Hatch</option>
                            <option value="Coupé">Coupé</option>
                            <option value="Conversível">Conversível</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td height="60px" class="pop">Modelo</td>
                    <td>
                        <input type="text" id="filtroModelo" placeholder="Ex: Carrera, Cayenne...">
                    </td>
                </tr>

                <tr>
                    <td height="60px" class="pop">Ano</td>
                    <td>
                        <input type="number" id="filtroAno" placeholder="Ex: 2024">
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="center" height="80px">
                        <button id="btnAbrirModal"
                            style="background: #2563eb; color: white; width: 85%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                            + Cadastrar Novo Carro
                        </button>
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="center" height="60px">
                        <a href="menu.html" class="botao-voltar"> ← Voltar</a>
                    </td>
                </tr>
            </table>
        </div>

        <table class="table">
            <thead>
                <thead>
                    <tr>
                        <th height="78px" style="border-top-left-radius: 8px;">Imagem</th>
                        <th>Marca</th>
                        <th>Modelo</th>
                        <th>Ano</th>
                        <th>Categoria</th>
                        <th>Valor</th>
                        <th>Cor</th>
                        <th>Status</th>
                        <th style="text-align: center;">Editar</th>
                        <th style="border-top-right-radius: 8px; text-align: center;">Excluir</th>
                    </tr>
                </thead>
            </thead>
            <tbody id="corpoTabelaCarros">
            </tbody>
        </table>
    </div>

    <div id="modalCadastro" class="modal-fundo">
        <div class="modal-conteudo">

            <div class="modal-header">
                <h2>Cadastrar Novo Veículo</h2>
                <button id="btnFecharModal" class="btn-fechar-modal">&times;</button>
            </div>

            <form id="formCadastrarCarro">
                <div class="modal-grid">

                    <div class="linha-completa">
                        <label>Marca:</label>
                        <input type="text" id="cadMarca" required placeholder="Ex: Porsche">
                    </div>

                    <div>
                        <label>Modelo:</label>
                        <input type="text" id="cadModelo" required placeholder="Ex: 911 Carrera">
                    </div>

                    <div>
                        <label>Carroceria:</label>
                        <select id="cadCategoria" required>
                            <option value="SUV">SUV</option>
                            <option value="Sedan">Sedan</option>
                            <option value="Hatch">Hatch</option>
                            <option value="Coupé">Coupé</option>
                            <option value="Conversível">Conversível</option>
                        </select>
                    </div>

                    <div>
                        <label>Ano de Fabricação:</label>
                        <input type="number" id="cadAno" required placeholder="Ex: 2026">
                    </div>

                    <div>
                        <label>Cor do Veículo:</label>
                        <input type="text" id="cadCor" placeholder="Ex: Prata GT">
                    </div>

                    <div class="linha-completa">
                        <label>Preço de Venda (R$):</label>
                        <input type="number" step="0.01" id="cadPreco" required placeholder="Ex: 850000.00">
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancelar" id="btnCancelarCarro">Cancelar</button>
                    <button type="submit" class="btn-salvar">Salvar no Estoque</button>
                </div>
            </form>

        </div>
    </div>

    <script src="../js/produtos.js"></script>
</body>

</html>
